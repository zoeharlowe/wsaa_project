<!DOCTYPE html>
<html>

<head>
    <title>Test Yourself</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Test Yourself</span>
            <a href="/" class="btn btn-light btn-sm">Back</a>
        </div>
    </nav>

    <div class="container">

        <h3 class="mb-4">Guess the English Translation</h3>

        <div id="quizCard" class="card p-4">
            <h4 id="irishWord" class="mb-3"></h4>

            <input id="answerInput" class="form-control mb-3" placeholder="Type the English translation">

            <button class="btn btn-success" onclick="checkAnswer()">Submit</button>
            <button class="btn btn-secondary" onclick="loadWord()">Next Word</button>

            <p id="result" class="mt-3 fw-bold"></p>
        </div>

    </div>

    <script>
        let acceptableAnswers = [];

        function loadWord() {
            fetch("/random_word")
                .then(r => r.json())
                .then(data => {
                    document.getElementById("irishWord").innerText = data.irish;

                    // Split stored meanings into a clean list
                    acceptableAnswers = data.english
                        .toLowerCase()
                        .split(",")
                        .map(s => s.trim());

                    document.getElementById("answerInput").value = "";
                    document.getElementById("result").innerText = "";
                });
        }

        // Normalise ANY user input into a clean list of words
        function normaliseInput(input) {
            return input
                .toLowerCase()
                // Replace ANY punctuation with commas
                .replace(/[^a-záéíóú0-9]+/g, ",")
                // Split on commas
                .split(",")
                // Trim and remove empty entries
                .map(s => s.trim())
                .filter(s => s.length > 0);
        }

        function checkAnswer() {
            const rawInput = document.getElementById("answerInput").value;
            const userAnswers = normaliseInput(rawInput);

            const correctSet = new Set(acceptableAnswers);
            const userSet = new Set(userAnswers);

            // Condition 1: user gives ONE correct meaning
            const singleCorrect =
                userAnswers.length === 1 && correctSet.has(userAnswers[0]);

            // Condition 2: user gives ALL meanings (order doesn't matter)
            const fullMatch =
                userAnswers.length === acceptableAnswers.length &&
                [...userSet].every(a => correctSet.has(a));

            if (singleCorrect || fullMatch) {
                document.getElementById("result").innerHTML =
                    "<span class='text-success'>Correct!</span>";
            } else {
                document.getElementById("result").innerHTML =
                    "<span class='text-danger'>Try again!</span>";
            }
        }
        loadWord(); // Load the first word when page opens
    </script>

</body>

</html>
