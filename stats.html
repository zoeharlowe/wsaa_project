<!DOCTYPE html>
<html>
<head>
    <title>Your Stats</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <span class="navbar-brand">Your Stats</span>
        <a href="/" class="btn btn-light btn-sm">Back</a>
    </div>
</nav>

<div class="container">

    <h3 class="mb-4">Performance Overview</h3>

    <div id="stats"></div>

</div>

<script>
fetch("/stats_data")
    .then(r => r.json())
    .then(data => {

        // If no quiz attempts exist
        if (data.total === 0) {
            document.getElementById("stats").innerHTML = `
                <div class="card p-4 text-center">
                    <h4>No data yet</h4>
                    <p>Test yourself first and check back here for your stats!</p>
                </div>
            `;
            return; // stop here
        }

        // Otherwise, show stats
        const accuracy = ((data.correct / data.total) * 100).toFixed(1);

        let html = `
            <div class="card p-4 mb-4">
                <h4>Summary</h4>
                <p><strong>Total Attempts:</strong> ${data.total}</p>
                <p><strong>Correct:</strong> ${data.correct}</p>
                <p><strong>Accuracy:</strong> ${accuracy}%</p>
            </div>

            <div class="card p-4 mb-4">
                <h4>Most Missed Words</h4>
                <ul>
        `;

        if (data.missed.length === 0) {
            html += `<li>No missed words yet — great job!</li>`;
        } else {
            data.missed.forEach(m => {
                html += `<li><strong>${m.irish}</strong> → ${m.english} (${m.misses} misses)</li>`;
            });
        }

        html += `
                </ul>
            </div>

            <div class="card p-4">
                <h4>Recent Attempts</h4>
                <ul>
        `;

        data.recent.forEach(r => {
            html += `<li>${r.timestamp}: <strong>${r.irish}</strong> → ${r.user_answer} (${r.correct ? "✔" : "✘"})</li>`;
        });

        html += `
                </ul>
            </div>
        `;

        document.getElementById("stats").innerHTML = html;
    });
</script>

</body>
</html>
